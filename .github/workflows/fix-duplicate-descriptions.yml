name: Fix Duplicate Descriptions
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply rewrites to Shopify'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      limit:
        description: 'Max products (0 = all)'
        default: '0'
permissions:
  contents: write
jobs:
  fix-dupes:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with: { ref: claude/deduplicate-shopify-products-tAKJ9 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Rewrite duplicate descriptions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          DUP_APPLY: ${{ github.event.inputs.apply }}
          DUP_LIMIT: ${{ github.event.inputs.limit }}
        run: python scripts/fix_duplicate_descriptions.py
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: 'dedup-desc-${{ github.run_id }}', path: 'reports/dedup-descriptions-*.log' }
      - name: Commit log
        if: always()
        run: |
          git config user.name "onelife-seo-bot"
          git config user.email "bot@onelife.co.za"
          git add reports/dedup-descriptions-*.log 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: duplicate description rewrites $(date +%Y-%m-%d)"
            git push
          fi
