name: Blog Article Images
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  blog-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/deduplicate-shopify-products-tAKJ9
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate blog article images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_STORE: onelifehealth
          BLOG_IMG_APPLY: 'true'
        run: python scripts/generate_blog_article_images.py
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-images-${{ github.run_id }}
          path: reports/blog-images-*.log
      - name: Commit log
        if: always()
        run: |
          git config user.name "onelife-seo-bot"
          git config user.email "bot@onelife.co.za"
          git add reports/blog-images-*.log 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: blog article images $(date +%Y-%m-%d)"
            git push
          fi
