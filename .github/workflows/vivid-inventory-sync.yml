name: Vivid inventory sync

on:
  schedule:
    - cron: "0 2 * * *" # 04:00 SAST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ONELIFE_OMNI_HTTP_REPORT_URL: ${{ secrets.ONELIFE_OMNI_HTTP_REPORT_URL }}
      ONELIFE_OMNI_HTTP_HOST: ${{ secrets.ONELIFE_OMNI_HTTP_HOST }}
      ONELIFE_OMNI_HTTP_USER: ${{ secrets.ONELIFE_OMNI_HTTP_USER }}
      ONELIFE_OMNI_HTTP_PASSWORD: ${{ secrets.ONELIFE_OMNI_HTTP_PASSWORD }}
      ONELIFE_OMNI_COMPANY: ${{ secrets.ONELIFE_OMNI_COMPANY }}
      ONELIFE_OMNI_SMB_HOST: ${{ secrets.ONELIFE_OMNI_SMB_HOST }}
      ONELIFE_OMNI_SMB_SHARE: ${{ secrets.ONELIFE_OMNI_SMB_SHARE }}
      ONELIFE_OMNI_SMB_DOMAIN: ${{ secrets.ONELIFE_OMNI_SMB_DOMAIN }}
      ONELIFE_OMNI_SMB_USER: ${{ secrets.ONELIFE_OMNI_SMB_USER }}
      ONELIFE_OMNI_SMB_PASSWORD: ${{ secrets.ONELIFE_OMNI_SMB_PASSWORD }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch Omni stock report from HTTP endpoint
        if: ${{ env.ONELIFE_OMNI_HTTP_REPORT_URL != '' || env.ONELIFE_OMNI_HTTP_PASSWORD != '' }}
        run: python3 scripts/onelife_omni_http_report_fetch.py --out tmp/omni-http-fetch/ana-stock-listing-cen.json

      - name: Install SMB client
        if: ${{ env.ONELIFE_OMNI_HTTP_REPORT_URL == '' && env.ONELIFE_OMNI_HTTP_PASSWORD == '' && env.ONELIFE_OMNI_SMB_PASSWORD != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y smbclient

      - name: Fetch Omni export from SMB
        if: ${{ env.ONELIFE_OMNI_HTTP_REPORT_URL == '' && env.ONELIFE_OMNI_HTTP_PASSWORD == '' && env.ONELIFE_OMNI_SMB_PASSWORD != '' }}
        run: python3 scripts/onelife_omni_export_fetch.py

      - name: Sync Vivid stock
        env:
          VIVID_SHOPIFY_STORE: hgywg0-w7.myshopify.com
          VIVID_SHOPIFY_ADMIN_TOKEN: ${{ secrets.VIVID_SHOPIFY_ADMIN_TOKEN }}
          VIVID_SHOPIFY_CLIENT_ID: ${{ secrets.VIVID_SHOPIFY_CLIENT_ID }}
          VIVID_SHOPIFY_CLIENT_SECRET: ${{ secrets.VIVID_SHOPIFY_CLIENT_SECRET }}
        run: |
          if [ -z "$VIVID_SHOPIFY_ADMIN_TOKEN" ] && { [ -z "$VIVID_SHOPIFY_CLIENT_ID" ] || [ -z "$VIVID_SHOPIFY_CLIENT_SECRET" ]; }; then
            echo "Missing Shopify credentials: set VIVID_SHOPIFY_ADMIN_TOKEN, or both VIVID_SHOPIFY_CLIENT_ID and VIVID_SHOPIFY_CLIENT_SECRET"
            exit 1
          fi
          if [ -f tmp/omni-http-fetch/ana-stock-listing-cen.json ]; then
            node scripts/sync-vivid-inventory.js --apply --max-age-days 1 --omni-export tmp/omni-http-fetch/ana-stock-listing-cen.json
          else
            node scripts/sync-vivid-inventory.js --apply --max-age-days 1
          fi
