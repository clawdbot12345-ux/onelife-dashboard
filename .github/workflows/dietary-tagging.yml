name: Dietary Attribute Tagger
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply tags to Shopify'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      limit:
        description: 'Max products (0 = all)'
        default: '0'
permissions:
  contents: write
jobs:
  dietary-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with: { ref: claude/deduplicate-shopify-products-tAKJ9 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Tag dietary attributes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_STORE: onelifehealth
          DIET_APPLY: ${{ github.event.inputs.apply }}
          DIET_LIMIT: ${{ github.event.inputs.limit }}
          DIET_BATCH_SIZE: '30'
        run: python scripts/tag_dietary_attributes.py
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: 'dietary-${{ github.run_id }}', path: 'reports/dietary-tagging-*.log' }
      - name: Commit log
        if: always()
        run: |
          git config user.name "onelife-seo-bot"
          git config user.email "bot@onelife.co.za"
          git add reports/dietary-tagging-*.log 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: dietary attribute tagging $(date +%Y-%m-%d)"
            git push
          fi
