name: Variant Consolidation
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply merges to Shopify'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      limit:
        description: 'Max groups (0 = all)'
        default: '0'
permissions:
  contents: write
jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with: { ref: claude/deduplicate-shopify-products-tAKJ9 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Consolidate size variants
        env:
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_STORE: onelifehealth
          VARIANT_APPLY: ${{ github.event.inputs.apply }}
          VARIANT_LIMIT: ${{ github.event.inputs.limit }}
        run: python scripts/consolidate_variants.py
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: 'variants-${{ github.run_id }}', path: 'reports/variant-consolidation-*.log' }
      - name: Commit log
        if: always()
        run: |
          git config user.name "onelife-seo-bot"
          git config user.email "bot@onelife.co.za"
          git add reports/variant-consolidation-*.log 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: variant consolidation $(date +%Y-%m-%d)"
            git push
          fi
