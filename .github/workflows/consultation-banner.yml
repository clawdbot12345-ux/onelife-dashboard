name: Generate Consultation Banner
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/deduplicate-shopify-products-tAKJ9
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate + upload banner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: python scripts/generate_consultation_banner.py
