name: Patch Theme

# Mirrors the LIVE theme onto the scratch copy, applies the mobile
# conversion fixes (theme-patch-spec-2026-07-02.md), renames it
# "(publish me)". Publishing stays a human click. Never touches LIVE.

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/triggers/patch-theme"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror + patch scratch theme
        env:
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          MODE: ${{ contains(github.event.head_commit.message, '[theme-dump]') && 'dump' || 'patch' }}
        run: python3 scripts/patch_theme.py
      - name: Commit dump
        if: always()
        run: |
          git config user.name "onelife-bot"
          git config user.email "bot@onelife.co.za"
          git add reports/theme-src/ || true
          git diff --cached --quiet || git commit -m "chore: theme source dump"
          git push || true
